<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#3a2515"/>
      <stop offset="100%" stop-color="#1a0f08"/>
    </radialGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f0c95a"/>
      <stop offset="100%" stop-color="#b88a2c"/>
    </linearGradient>
    <linearGradient id="ember" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#d4b048"/>
      <stop offset="100%" stop-color="#c97b3a"/>
    </linearGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="4"/></filter>
  </defs>

  <!-- Background circle -->
  <circle cx="256" cy="256" r="248" fill="url(#bg)" stroke="#5a3a1f" stroke-width="4"/>

  <!-- Outer hex ring -->
  <g stroke="#5a3a1f" stroke-width="2" fill="none">
    <polygon points="256,40 432,140 432,340 256,440 80,340 80,140"/>
  </g>

  <!-- Inner hex (filled gold) -->
  <polygon points="256,90 392,165 392,315 256,390 120,315 120,165"
           fill="url(#gold)" stroke="#8a5a20" stroke-width="3"/>

  <!-- Center hex grid pattern (small hexes) -->
  <g fill="#8a5a20" opacity="0.35">
    <!-- center -->
    <polygon points="256,210 286,228 286,264 256,282 226,264 226,228"/>
    <!-- top -->
    <polygon points="256,144 286,162 286,198 256,216 226,198 226,162"/>
    <!-- bottom -->
    <polygon points="256,276 286,294 286,330 256,348 226,330 226,294"/>
    <!-- upper right -->
    <polygon points="316,177 346,195 346,231 316,249 286,231 286,195"/>
    <!-- upper left -->
    <polygon points="196,177 226,195 226,231 196,249 166,231 166,195"/>
    <!-- lower right -->
    <polygon points="316,243 346,261 346,297 316,315 286,297 286,261"/>
    <!-- lower left -->
    <polygon points="196,243 226,261 226,297 196,315 166,297 166,261"/>
  </g>

  <!-- Cracked-earth lines through center -->
  <g stroke="#5a3a1f" stroke-width="2" opacity="0.6" fill="none">
    <path d="M 130 260 Q 200 240, 256 250 Q 320 260, 380 245"/>
    <path d="M 256 100 L 260 200 L 245 280 L 256 380"/>
  </g>

  <!-- TB monogram -->
  <g fill="#1a0f08" font-family="Impact, 'Arial Black', sans-serif" text-anchor="middle">
    <text x="256" y="280" font-size="160" font-weight="900" letter-spacing="-4">TB</text>
  </g>

  <!-- Subtitle ring -->
  <g fill="#d4b048" font-family="Georgia, serif" text-anchor="middle">
    <text x="256" y="470" font-size="22" letter-spacing="6">TRIBES OF THE DUST</text>
  </g>

  <!-- Ember glow accents (top corners) -->
  <circle cx="256" cy="90" r="6" fill="#f0c95a" filter="url(#glow)"/>
  <circle cx="120" cy="315" r="4" fill="#c97b3a" opacity="0.7"/>
  <circle cx="392" cy="315" r="4" fill="#c97b3a" opacity="0.7"/>
</svg>
